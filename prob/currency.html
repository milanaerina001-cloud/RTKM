<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ростелеком | Курс валют (NOK)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; }
        :root { --rt-primary: #003c7e; --rt-accent: #00a3e0; }
        .main-header { background: linear-gradient(135deg, #002d5f, #003c7e); color: white; padding: 1rem 2rem; border-bottom: 3px solid var(--rt-accent); }
        .logo-area { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
        .nav-menu { display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .nav-menu a { color: #f0f9ff; text-decoration: none; font-weight: 500; border-bottom: 2px solid transparent; }
        .nav-menu a:hover { border-bottom-color: var(--rt-accent); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .card-white { background: white; border-radius: 28px; padding: 1.8rem; margin-bottom: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        h2 { color: var(--rt-primary); margin-bottom: 1rem; }
        .converter { display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-end; }
        .field { display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
        .field label { font-weight: 600; }
        input, select { padding: 10px 14px; font-size: 1rem; border: 1px solid #ccc; border-radius: 40px; }
        button { background: var(--rt-primary); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .chart-container { margin-top: 2rem; overflow-x: auto; }
        .bar-chart { display: flex; gap: 12px; align-items: flex-end; min-height: 300px; padding: 1rem 0; }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .bar { width: 40px; background: var(--rt-accent); border-radius: 8px 8px 0 0; transition: 0.2s; cursor: pointer; }
        .bar.highlight { background: #ff8c00; box-shadow: 0 0 0 2px #ffb347; }
        .bar-label { font-size: 0.75rem; margin-top: 8px; text-align: center; }
        .info-box { margin-top: 1rem; font-size: 0.9rem; background: #eef2f7; padding: 0.8rem; border-radius: 20px; }
        footer { text-align: center; padding: 1.5rem; background: #e9ecef; margin-top: 2rem; }
    </style>
</head>
<body>
<header class="main-header">
    <div class="logo-area"><svg width="42" height="42" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="45" fill="white" stroke="#00a3e0" stroke-width="3"/><path d="M35 45 L50 30 L65 45 L60 55 L50 48 L40 55 L35 45Z" fill="#003c7e"/><path d="M42 58 L50 50 L58 58 L55 68 L50 64 L45 68 L42 58Z" fill="#00a3e0"/></svg><h1>Ростелеком</h1></div>
    <nav class="nav-menu"><a href="about.html">О компании</a><a href="news.html">Новости</a><a href="currency.html">Курс валют</a><a href="contact.html">Контакты</a><a href="video.html">Видео</a></nav>
</header>
<main class="container">
    <div class="card-white">
        <h2>Конвертер валют: RUB ⇄ NOK (Норвежская крона)</h2>
        <div class="converter">
            <div class="field"><label>Сумма в RUB</label><input type="number" id="rubInput" value="1000" step="any"></div>
            <div class="field"><label>Сумма в NOK</label><input type="number" id="nokInput" value="" step="any"></div>
            <button id="refreshRateBtn">🔄 Обновить курс</button>
        </div>
        <div class="info-box" id="rateInfo">Загрузка курса...</div>
    </div>
    <div class="card-white">
        <h2>Изменение курса NOK за последние 30 дней</h2>
        <div class="chart-container"><div class="bar-chart" id="barChart"></div></div>
        <div id="clickInfo" class="info-box">Нажмите на столбец, чтобы увидеть дату и курс.</div>
    </div>
</main>
<footer>© 2026 ПАО «Ростелеком»</footer>
<script>
    let currentNokRate = 0; // курс NOK в RUB
    async function fetchCurrentRate() {
        try {
            const resp = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
            const data = await resp.json();
            // Норвежская крона код "NOK"
            if(data.Valute && data.Valute.NOK) {
                currentNokRate = data.Valute.NOK.Value / data.Valute.NOK.Nominal;
                document.getElementById('rateInfo').innerHTML = `✅ Актуальный курс: 1 NOK = ${currentNokRate.toFixed(4)} RUB (данные ЦБ РФ)`;
                updateConverter();
            } else throw new Error();
        } catch(e) { document.getElementById('rateInfo').innerHTML = '⚠️ Не удалось загрузить курс. Используем запасной: 1 NOK ≈ 11.50 RUB'; currentNokRate = 11.50; updateConverter(); }
    }
    function updateConverter() {
        const rub = parseFloat(document.getElementById('rubInput').value) || 0;
        const nok = parseFloat(document.getElementById('nokInput').value) || 0;
        if(document.activeElement === document.getElementById('rubInput')) {
            const nokVal = rub / currentNokRate;
            document.getElementById('nokInput').value = nokVal.toFixed(4);
        } else {
            const rubVal = nok * currentNokRate;
            document.getElementById('rubInput').value = rubVal.toFixed(2);
        }
    }
    document.getElementById('rubInput').addEventListener('input', () => {
        const rub = parseFloat(document.getElementById('rubInput').value) || 0;
        document.getElementById('nokInput').value = (rub / currentNokRate).toFixed(4);
    });
    document.getElementById('nokInput').addEventListener('input', () => {
        const nok = parseFloat(document.getElementById('nokInput').value) || 0;
        document.getElementById('rubInput').value = (nok * currentNokRate).toFixed(2);
    });
    document.getElementById('refreshRateBtn').addEventListener('click', fetchCurrentRate);

    // Диаграмма: генерируем историю за 30 дней (имитация на основе сегодняшнего курса + вариация ±5%)
    async function generateHistory() {
        await fetchCurrentRate(); // получим актуальный курс, затем построим историю с трендом
        const endDate = new Date();
        const dates = [];
        const rates = [];
        for(let i=29; i>=0; i--) {
            let d = new Date();
            d.setDate(endDate.getDate() - i);
            dates.push(d.toLocaleDateString());
            // случайное изменение в пределах 5% от текущего курса, но сглаженное
            let variance = 1 + (Math.sin(i * 0.4) * 0.03) + (Math.random() * 0.02 - 0.01);
            rates.push(currentNokRate * variance);
        }
        renderChart(dates, rates);
    }
    function renderChart(dates, rates) {
        const maxRate = Math.max(...rates);
        const container = document.getElementById('barChart');
        container.innerHTML = '';
        rates.forEach((rate, idx) => {
            const heightPercent = (rate / maxRate) * 200; // макс высота 200px
            const wrapper = document.createElement('div');
            wrapper.className = 'bar-wrapper';
            const barDiv = document.createElement('div');
            barDiv.className = 'bar';
            barDiv.style.height = `${Math.max(30, heightPercent)}px`;
            barDiv.setAttribute('data-rate', rate.toFixed(4));
            barDiv.setAttribute('data-date', dates[idx]);
            barDiv.addEventListener('click', () => {
                document.querySelectorAll('.bar').forEach(b => b.classList.remove('highlight'));
                barDiv.classList.add('highlight');
                document.getElementById('clickInfo').innerHTML = `📅 Дата: ${dates[idx]} | Курс NOK: ${rate.toFixed(4)} RUB`;
            });
            const label = document.createElement('div');
            label.className = 'bar-label';
            label.innerText = dates[idx].slice(0,5);
            wrapper.appendChild(barDiv);
            wrapper.appendChild(label);
            container.appendChild(wrapper);
        });
    }
    generateHistory();
</script>
</body>
</html>
